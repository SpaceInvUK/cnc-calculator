<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FAST CNC — New Design</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

  /* LIGHT theme (default) */
  .app{display:grid;grid-template-columns:236px 1fr 314px;grid-template-rows:50px 46px 1fr 30px;height:100vh;width:100vw;
    --bg:#f5f8f7;--chrome:#ffffff;--chrome-tx:#0f172a;--rail-ico:#0f766e;--accent:#0d9488;
    --panel:#ffffff;--bd:#e6ece9;--text:#0f172a;--muted:#7b8794;--canvas:#ffffff;--soft:#f1f6f4;--hover:#eef4f2;
    --radius:12px;--shadow:0 4px 16px rgba(15,40,30,.07);--disabled:#b8c2bd}
  /* DARK theme (truly dark everywhere) */
  .app.dark{--bg:#0e1116;--chrome:#161a20;--chrome-tx:#e6e9ee;--rail-ico:#aeb6c2;--accent:#3b82f6;
    --panel:#171b21;--bd:#2a3038;--text:#e6e9ee;--muted:#8b93a1;--canvas:#0b0d11;--soft:#222833;--hover:#262d38;
    --radius:12px;--shadow:0 6px 20px rgba(0,0,0,.5);--disabled:#5b6470}

  .topbar{grid-column:1/4;grid-row:1;background:var(--chrome);color:var(--chrome-tx);display:flex;align-items:center;gap:16px;
    padding:0 16px;border-bottom:1px solid var(--bd)}
  .logo{font-weight:900;letter-spacing:.5px;font-size:15px;display:flex;align-items:center;gap:8px}
  .logo .dot{width:11px;height:11px;border-radius:3px;background:var(--accent)}
  .menu{display:flex;gap:14px;font-size:13px;opacity:.85}.menu span{cursor:pointer}
  .topbar .spacer{flex:1}
  .ttool{display:flex;gap:6px;align-items:center}
  .ttool button{display:flex;align-items:center;gap:6px;border:0;border-radius:8px;padding:7px 12px;font-weight:700;
    font-size:12px;cursor:pointer;background:var(--soft);color:var(--text)}
  .ttool button.icobtn{width:34px;height:34px;padding:0;justify-content:center;font-size:15px}
  .ttool button.primary{background:var(--accent);color:#fff}

  .optpop{position:absolute;top:52px;right:14px;z-index:40;background:var(--panel);border:1px solid var(--bd);
    border-radius:12px;box-shadow:var(--shadow);padding:12px 14px;min-width:210px;display:none}
  .optpop.show{display:block}
  .optpop .ttl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;margin-bottom:10px}
  .optrow{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:10px;font-size:12.5px}
  .optrow:last-child{margin-bottom:0}

  .rail{grid-column:1/4;grid-row:2;background:var(--chrome);display:flex;flex-direction:row;align-items:center;gap:6px;padding:0 12px;border-bottom:1px solid var(--bd)}
  .rail .tool{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--rail-ico)}
  .rail .tool svg{width:21px;height:21px}
  .rail .tool:hover{background:var(--hover)}
  .rail .tool.on{background:var(--accent);color:#fff}
  .rail .tool.disabled{opacity:.4;cursor:not-allowed}
  .rail .sep{width:1px;height:26px;background:var(--bd);margin:0 4px}

  .tree{grid-column:1;grid-row:3;background:var(--panel);border-right:1px solid var(--bd);overflow:auto;padding:10px}
  .tree h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:6px 6px 8px}
  .node{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text)}
  .node:hover{background:var(--hover)}
  .node.sel{background:color-mix(in srgb,var(--accent) 18%,transparent);font-weight:700;color:var(--accent)}
  .node .ic{width:15px;height:15px;opacity:.85;display:flex}
  .node .tag{margin-left:auto;font-size:10px;color:var(--muted)}
  .roomcard{border:1px solid var(--bd);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
  .roomcard>.node{border-radius:0}

  .stage{grid-column:2;grid-row:3;background:var(--canvas);position:relative;overflow:hidden;display:flex;flex-direction:column}
  .crumbs{position:absolute;top:12px;left:14px;font-size:12px;color:var(--muted);z-index:2;background:var(--panel);
    border:1px solid var(--bd);padding:6px 12px;border-radius:999px;box-shadow:var(--shadow)}
  .crumbs b{color:var(--accent)}
  .viewcube{position:absolute;top:12px;right:14px;display:flex;gap:5px;z-index:2}
  .viewcube button{border:1px solid var(--bd);background:var(--panel);border-radius:8px;min-width:34px;height:30px;font-size:11px;font-weight:800;color:var(--muted);cursor:pointer;padding:0 8px}
  .viewcube button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .viewcube button.disabled{opacity:.45;cursor:not-allowed}
  .canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:56px 30px 34px}
  .canvas-wrap svg{width:100%;height:100%;max-width:900px}
  .canvas-wrap svg .pk{cursor:pointer}
  .zoombar{position:absolute;bottom:14px;left:14px;display:flex;gap:4px;z-index:2}
  .zoombar button{border:1px solid var(--bd);background:var(--panel);width:30px;height:30px;border-radius:8px;font-size:15px;font-weight:800;color:var(--muted);cursor:pointer;box-shadow:var(--shadow)}
  .soon{position:absolute;bottom:14px;right:14px;font-size:10.5px;color:var(--muted);background:var(--panel);border:1px dashed var(--bd);padding:4px 10px;border-radius:999px;max-width:46%}

  .insp{grid-column:3;grid-row:3;background:var(--panel);border-left:1px solid var(--bd);overflow:auto}
  .ihead{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
  .ihead .pic{width:34px;height:34px;border-radius:9px;background:color-mix(in srgb,var(--accent) 18%,transparent);display:flex;align-items:center;justify-content:center;color:var(--accent)}
  .ihead .t{font-weight:800;font-size:14px}.ihead .s{font-size:11px;color:var(--muted)}
  .sec{padding:12px 16px;border-bottom:1px solid var(--bd)}
  .sec .lab{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;margin-bottom:10px}
  .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}
  .row:last-child{margin-bottom:0}
  .row label{font-size:12.5px;color:var(--text)}
  .row .val{font-size:12.5px;font-weight:700;background:var(--soft);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;min-width:64px;text-align:center}
  .seg{display:flex;background:var(--soft);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
  .seg span{padding:5px 11px;font-size:11.5px;font-weight:700;color:var(--muted);cursor:pointer}
  .seg span.on{background:var(--accent);color:#fff}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:11px;font-weight:700;padding:5px 9px;border-radius:999px;background:var(--soft);border:1px solid var(--bd);color:var(--text)}
  .chip.warn{background:color-mix(in srgb,#f59e0b 22%,var(--panel));border-color:#d9942a;color:var(--text)}

  .status{grid-column:1/4;grid-row:4;background:var(--chrome);color:var(--chrome-tx);display:flex;align-items:center;gap:18px;padding:0 16px;font-size:12px;border-top:1px solid var(--bd)}
  .status .pill{background:var(--soft);padding:3px 10px;border-radius:999px;font-weight:700}
  .status .spacer{flex:1}.status b{color:var(--accent)}
</style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar">
      <div class="logo"><span class="dot"></span> FAST CNC</div>
      <div class="menu" id="menu"></div>
      <div class="spacer"></div>
      <div class="ttool">
        <button class="icobtn" id="gear" title="Options" onclick="toggleOpt(event)">⚙</button>
        <button>↶</button><button>↷</button>
        <button class="primary" id="exportBtn">⬇ Export DXF</button>
      </div>
    </div>
    <div class="optpop" id="optpop">
      <div class="ttl" id="optTitle">Options</div>
      <div class="optrow"><span id="lblTheme">Theme</span>
        <div class="seg"><span id="thLight" onclick="setTheme('light')">Light</span><span id="thDark" onclick="setTheme('dark')">Dark</span></div></div>
      <div class="optrow"><span id="lblLang">Language</span>
        <div class="seg"><span id="lgEn" onclick="setLang('en')">EN</span><span id="lgPt" onclick="setLang('pt')">PT</span></div></div>
    </div>

    <div class="rail" id="rail"></div>
    <div class="tree" id="tree"></div>

    <div class="stage">
      <div class="crumbs" id="crumbs"></div>
      <div class="viewcube" id="viewcube"></div>
      <div class="canvas-wrap" id="canvas"></div>
      <div class="zoombar"><button>+</button><button>−</button><button>⤢</button></div>
      <div class="soon" id="soon"></div>
    </div>

    <div class="insp" id="insp"></div>
    <div class="status" id="status"></div>
  </div>

<script>
  // ===== i18n (English default) =====
  const STR={
    en:{m_file:'File',m_edit:'Edit',m_view:'View',m_insert:'Insert',m_export:'Export',
      tool_select:'Select',tool_wall:'Wall',tool_door:'Door',tool_window:'Window',tool_object:'Object',tool_panel:'Panel',tool_measure:'Measure',tool_pan:'Pan',tool_zoom:'Zoom',tool_export:'Export',
      project:'Project',addroom:'+ Add room',sheets:'sheets',exportdxf:'Export DXF',
      soon_tip:'Coming soon (not programmed yet)',phase1:'Phase 1 · visual shell — engine comes in Phase 2',
      options:'Options',theme:'Theme',light:'Light',dark:'Dark',language:'Language',
      st_panels:'panels',st_used:'sheets · 62.4% used',st_shaker:'Shaker',st_total:'Total',
      s_shaker:'Shaker',s_siderules:'Side rules',s_offset:'Offset / Pocketing',s_material:'Material',s_door:'Door',
      s_siderule:'Side rule',s_window:'Window',s_object:'Object',s_toppanel:'Top panel',s_wall:'Wall',s_finish:'Finish',s_room:'Room',
      f_type:'Type',f_frame:'Frame (mm)',f_size:'Size',f_columns:'Columns',f_rows:'Rows',f_top:'Top',f_right:'Right',f_bottom:'Bottom',f_left:'Left',
      f_width:'Width (mm)',f_height:'Height (mm)',f_posx:'Position X',f_measfrom:'Measure X from',f_sill:'Sill (mm)',
      f_name:'Name',f_base:'Base (mm)',f_createtop:'Create top panel',f_bottomshaker:'Bottom to Shaker',
      f_paneldir:'Panel direction',f_panelheight:'Panel height',f_material:'Material',f_thickness:'Thickness',f_skirting:'Skirting',f_skirtingh:'Skirting height',f_panelsbeside:'Panels beside',
      v_auto:'Auto',v_lock:'Lock',v_h:'Horizontal',v_v:'Vertical',v_yes:'Yes',v_no:'No',v_left:'Left',v_right:'Right',
      d_vertical:'vertical',d_opening:'opening',d_object:'object',d_room:'room',lab_panel:'Panel',lab_object:'Object'},
    pt:{m_file:'Arquivo',m_edit:'Editar',m_view:'Ver',m_insert:'Inserir',m_export:'Exportar',
      tool_select:'Selecionar',tool_wall:'Parede',tool_door:'Porta',tool_window:'Janela',tool_object:'Objeto',tool_panel:'Painel',tool_measure:'Medir',tool_pan:'Mover',tool_zoom:'Zoom',tool_export:'Exportar',
      project:'Projeto',addroom:'+ Adicionar room',sheets:'chapas',exportdxf:'Exportar DXF',
      soon_tip:'Em breve (ainda não programado)',phase1:'Fase 1 · shell visual — motor entra na Fase 2',
      options:'Opções',theme:'Tema',light:'Claro',dark:'Escuro',language:'Idioma',
      st_panels:'painéis',st_used:'chapas · 62.4% usado',st_shaker:'Shaker',st_total:'Total',
      s_shaker:'Shaker',s_siderules:'Regras de lado',s_offset:'Offset / Pocketing',s_material:'Material',s_door:'Porta',
      s_siderule:'Regra do lado',s_window:'Janela',s_object:'Objeto',s_toppanel:'Painel em cima',s_wall:'Parede',s_finish:'Acabamento',s_room:'Room',
      f_type:'Tipo',f_frame:'Frame (mm)',f_size:'Tamanho',f_columns:'Colunas',f_rows:'Linhas',f_top:'Topo',f_right:'Direita',f_bottom:'Baixo',f_left:'Esquerda',
      f_width:'Largura (mm)',f_height:'Altura (mm)',f_posx:'Posição X',f_measfrom:'Medir X de',f_sill:'Peitoril (mm)',
      f_name:'Nome',f_base:'Base (mm)',f_createtop:'Criar painel no topo',f_bottomshaker:'Bottom to Shaker',
      f_paneldir:'Direção painel',f_panelheight:'Altura painel',f_material:'Material',f_thickness:'Espessura',f_skirting:'Skirting',f_skirtingh:'Altura skirting',f_panelsbeside:'Painéis ao lado',
      v_auto:'Auto',v_lock:'Lock',v_h:'Horizontal',v_v:'Vertical',v_yes:'Sim',v_no:'Não',v_left:'Esq',v_right:'Dir',
      d_vertical:'vertical',d_opening:'abertura',d_object:'objeto',d_room:'cômodo',lab_panel:'Painel',lab_object:'Objeto'}
  };
  let lang='en', theme='light';
  const t=k=>(STR[lang]&&STR[lang][k])||STR.en[k]||k;

  // ===== icons =====
  const ICONS={cursor:'M4 3l16 7-7 2-2 7z',wall:'M3 5h18v14H3z M3 10h18 M9 5v5 M15 10v9',door:'M6 3h9v18H6z M12 12h.01 M15 3l3 2v16h-3',
    window:'M4 4h16v16H4z M12 4v16 M4 12h16',object:'M4 8l8-4 8 4-8 4z M4 8v8l8 4 8-4V8',panel:'M4 3h16v18H4z M10 3v18 M4 9h6 M14 15h6',
    ruler:'M3 8l13 13 5-5L8 3z M8 8l2 2 M12 7l2 2 M7 12l2 2',hand:'M7 11V6a2 2 0 014 0v5 M11 6a2 2 0 014 0v5 M15 8a2 2 0 014 0v7a5 5 0 01-5 5h-3l-4-4',
    zoom:'M10 4a6 6 0 100 12 6 6 0 000-12z M20 20l-5-5',add:'M12 5v14 M5 12h14',dxf:'M6 2h9l5 5v15H6z M14 2v6h6'};
  const svgIcon=(n,sw)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw||1.7}" stroke-linecap="round" stroke-linejoin="round"><path d="${ICONS[n]||''}"/></svg>`;

  const TOOLS=[['cursor','select',1],['wall','wall'],['door','door'],['window','window'],['object','object'],['panel','panel'],
    ['sep'],['ruler','measure'],['hand','pan'],['zoom','zoom'],['sep'],['dxf','export']];

  // ===== project data =====
  const PROJECT=[
    {type:'room',name:'Bedroom 2',sheets:5,open:true,children:[
      {type:'wall',name:'Wall 1 — 5909×3200',children:[{type:'panel',name:'P1V'},{type:'panel',name:'P3V'},{type:'door',name:'Door'},{type:'object',name:'BED'}]}
    ]},
    {type:'room',name:'Ensuite 2',sheets:4},
    {type:'room',name:'Principle bedroom',sheets:3}
  ];
  let selected={type:'panel',name:'P3V'};

  // ===== inspector (one contextual panel, DRY templates) =====
  const F=(l,v)=>`<div class="row"><label>${l}</label><div class="val">${v}</div></div>`;
  const SEG=(l,opts,on)=>`<div class="row"><label>${l}</label><div class="seg">${opts.map((o,i)=>`<span class="${i===on?'on':''}">${o}</span>`).join('')}</div></div>`;
  const SEC=(lab,body)=>`<div class="sec"><div class="lab">${lab}</div>${body}</div>`;
  function inspectorBody(){
    const ty=selected.type;
    if(ty==='door') return SEC(t('s_door'),F(t('f_width'),'820')+F(t('f_height'),'2100')+F(t('f_posx'),'4134')+SEG(t('f_measfrom'),[t('v_left'),t('v_right')],0))+SEC(t('s_siderule'),F(t('f_panelsbeside'),'Door = 175'));
    if(ty==='window') return SEC(t('s_window'),F(t('f_width'),'1200')+F(t('f_height'),'1100')+F(t('f_sill'),'900')+F(t('f_posx'),t('v_auto')));
    if(ty==='object') return SEC(t('s_object'),F(t('f_name'),'BED')+F(t('f_width'),'2000')+F(t('f_height'),'1600')+F(t('f_base'),'0'))+SEC(t('s_toppanel'),SEG(t('f_createtop'),[t('v_yes'),t('v_no')],0)+F(t('f_bottomshaker'),t('v_auto')));
    if(ty==='wall') return SEC(t('s_wall'),F(t('f_width'),'5909')+F(t('f_height'),'3200')+SEG(t('f_paneldir'),[t('v_h'),t('v_v')],1)+F(t('f_panelheight'),'2800'));
    if(ty==='room') return SEC(t('s_room'),F(t('f_name'),selected.name)+F(t('f_material'),'MDF Hidrófugo')+F(t('f_thickness'),'22mm')+F(t('f_frame'),'80'))+SEC(t('s_finish'),SEG(t('f_skirting'),[t('v_yes'),t('v_no')],0)+F(t('f_skirtingh'),'225'));
    return SEC(t('s_shaker'),SEG(t('f_type'),['Flat','Shaker','Reeded'],1)+F(t('f_frame'),'80')+SEG(t('f_size'),[t('v_auto'),t('v_lock')],0)+F(t('f_columns'),'2')+F(t('f_rows'),t('v_auto')))+
      SEC(t('s_siderules'),F(t('f_top'),'Normal')+F(t('f_right'),'Joint')+F(t('f_bottom'),'Normal')+F(t('f_left'),'Joint'))+
      SEC(t('s_offset'),'<div class="chips"><span class="chip">A 0</span><span class="chip">B 6</span><span class="chip">C 8</span><span class="chip">D 19</span><span class="chip">E 25</span><span class="chip">F 28.5</span><span class="chip warn">Back 80</span></div>')+
      SEC(t('s_material'),F('MDF Hidrófugo','22mm'));
  }
  function subFor(){const m={panel:'Bedroom 2 · Wall 1 · '+t('d_vertical'),door:'Bedroom 2 · Wall 1 · '+t('d_opening'),window:t('d_opening'),object:'Bedroom 2 · Wall 1 · '+t('d_object'),wall:'Bedroom 2',room:t('d_room')};return m[selected.type]||'';}
  function titleFor(){const m={panel:t('lab_panel')+' '+selected.name,door:selected.name,window:t('s_window'),object:t('lab_object')+' '+selected.name,wall:selected.name,room:selected.name};return m[selected.type]||selected.name;}
  function renderInspector(){const ic=selected.type==='room'?'wall':selected.type;
    insp.innerHTML=`<div class="ihead"><div class="pic">${svgIcon(ic,1.7)}</div><div><div class="t">${titleFor()}</div><div class="s">${subFor()}</div></div></div>`+inspectorBody();}

  // ===== tree =====
  function node(item,depth){const sel=item.name===selected.name?'sel':'';
    return `<div class="node ${sel}" data-sel="1" data-type="${item.type}" data-name="${item.name}" style="margin-left:${depth*18}px">`+
      `<span class="ic">${svgIcon(item.type==='room'?'wall':item.type,1.6)}</span> ${item.name}`+(item.sheets?`<span class="tag">${item.sheets} ${t('sheets')}</span>`:'')+`</div>`;}
  function renderTree(){let h=`<h4>${t('project')}</h4>`;
    PROJECT.forEach(r=>{h+='<div class="roomcard">'+node(r,0);if(r.open&&r.children)r.children.forEach(w=>{h+=node(w,1);(w.children||[]).forEach(c=>h+=node(c,2));});h+='</div>';});
    h+=`<div class="roomcard"><div class="node" style="color:var(--muted)"><span class="ic">${svgIcon('add',1.6)}</span> ${t('addroom')}</div></div>`;
    tree.innerHTML=h;tree.querySelectorAll('.node[data-sel]').forEach(n=>n.onclick=()=>select(n.dataset.type,n.dataset.name));}

  // ===== canvas elevation (theme-aware palette) =====
  const PAL={light:{wall:'#f8fafc',wallBd:'#94a3b8',floor:'#475569',dim:'#64748b',pFill:'#dcfce7',pBd:'#16a34a',cell:'#ffffff',capFill:'#dbeafe',capBd:'#2563eb',obj:'#eef2f7',objBd:'#94a3b8',objTx:'#64748b',door:'#fde7ef',doorBd:'#db2777',lab:'#475569',sel:'#2563eb'},
    dark:{wall:'#11151c',wallBd:'#3a424e',floor:'#6b7686',dim:'#9aa3b2',pFill:'#15311f',pBd:'#22c55e',cell:'#10151b',capFill:'#16233f',capBd:'#3b82f6',obj:'#161b22',objBd:'#3a424e',objTx:'#9aa3b2',door:'#371728',doorBd:'#ec4899',lab:'#c3cad6',sel:'#60a5fa'}};
  const pal=()=>PAL[theme];
  function panelGroup(x,y,w,h,cols,o){o=o||{};const P=pal();const fill=o.fill||P.pFill,stroke=o.stroke||P.pBd,fr=8;
    let s=`<g class="pk" data-type="${o.dtype||'panel'}" data-name="${o.label||''}">`;
    s+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`;
    const iw=w-fr*2,cw=(iw-fr*(cols-1))/cols;
    for(let i=0;i<cols;i++){const cx=x+fr+i*(cw+fr);
      s+=`<rect x="${cx}" y="${y+fr}" width="${cw}" height="${h-fr*2}" rx="2" fill="${P.cell}" stroke="${stroke}" stroke-width="1"/>`;
      for(let r=1;r<3;r++){const lx=cx+cw*r/3;s+=`<line x1="${lx}" y1="${y+fr+4}" x2="${lx}" y2="${y+h-fr-4}" stroke="${stroke}" stroke-opacity=".4"/>`;}}
    if(o.sel){s+=`<rect x="${x-3}" y="${y-3}" width="${w+6}" height="${h+6}" rx="5" fill="none" stroke="${P.sel}" stroke-width="2"/>`;
      [[x-3,y-3],[x+w+3,y-3],[x-3,y+h+3],[x+w+3,y+h+3]].forEach(p=>s+=`<rect x="${p[0]-3}" y="${p[1]-3}" width="6" height="6" fill="${P.sel}"/>`);}
    if(o.label)s+=`<text x="${x+w/2}" y="${y-8}" text-anchor="middle" font-size="11" font-weight="700" fill="${o.sel?P.sel:P.lab}">${o.label}</text>`;
    return s+'</g>';}
  function wallSVG(){const P=pal(),X=40,Y=46,W=800,H=300,floor=Y+H,sel=n=>selected.name===n;
    let s=`<svg viewBox="0 0 880 400">`;
    s+=`<rect x="${X}" y="${Y}" width="${W}" height="${H}" fill="${P.wall}" stroke="${P.wallBd}" stroke-width="1.5"/>`;
    s+=`<line x1="${X-10}" y1="${floor}" x2="${X+W+10}" y2="${floor}" stroke="${P.floor}" stroke-width="2"/>`;
    s+=`<text x="${X+W/2}" y="${Y-22}" text-anchor="middle" font-size="12" fill="${P.dim}">5909 mm</text>`;
    s+=`<text x="${X-20}" y="${Y+H/2}" text-anchor="middle" font-size="12" fill="${P.dim}" transform="rotate(-90 ${X-20} ${Y+H/2})">3200 mm</text>`;
    s+=panelGroup(X+8,Y+10,120,H-20,2,{label:'P1V',sel:sel('P1V')});
    const bx=X+150,bw=210,bedTop=Y+150;
    s+=panelGroup(bx,Y+10,bw,130,4,{label:'P5V',fill:P.capFill,stroke:P.capBd,sel:sel('P5V')});
    s+=`<g class="pk" data-type="object" data-name="BED"><rect x="${bx}" y="${bedTop}" width="${bw}" height="${floor-bedTop}" fill="${P.obj}" stroke="${P.objBd}" stroke-dasharray="5 4" stroke-width="1.3"/>`;
    s+=`<text x="${bx+bw/2}" y="${bedTop+(floor-bedTop)/2}" text-anchor="middle" font-size="13" font-weight="800" fill="${P.objTx}">BED</text></g>`;
    s+=panelGroup(X+372,Y+10,90,H-20,2,{label:'P2V',sel:sel('P2V')});
    s+=panelGroup(X+470,Y+10,70,H-20,1,{label:'P3V',sel:sel('P3V')});
    const dx=X+552,dw=90,dtop=Y+95;
    s+=`<g class="pk" data-type="door" data-name="Door"><rect x="${dx}" y="${dtop}" width="${dw}" height="${floor-dtop}" rx="3" fill="${P.door}" stroke="${P.doorBd}" stroke-width="1.5"/>`;
    s+=`<text x="${dx+dw/2}" y="${dtop-8}" text-anchor="middle" font-size="11" font-weight="700" fill="${P.doorBd}">DOOR</text></g>`;
    s+=panelGroup(X+654,Y+10,138,H-20,2,{label:'P4V',sel:sel('P4V')});
    return s+'</svg>';}
  function renderCanvas(){canvas.innerHTML=wallSVG();canvas.querySelectorAll('.pk').forEach(g=>g.onclick=()=>select(g.dataset.type,g.dataset.name));}

  // ===== chrome (menu, rail, status, viewcube, options) =====
  function renderChrome(){
    menu.innerHTML=['m_file','m_edit','m_view','m_insert','m_export'].map(k=>`<span>${t(k)}</span>`).join('');
    rail.innerHTML=TOOLS.map(x=>x[0]==='sep'?'<div class="sep"></div>':`<div class="tool ${x[2]?'on':''}" title="${t('tool_'+x[1])}">${svgIcon(x[0])}</div>`).join('');
    exportBtn.textContent='⬇ '+t('exportdxf');
    viewcube.innerHTML=`<button class="on">2D</button><button class="disabled" title="${t('soon_tip')}">2.5D</button><button class="disabled" title="${t('soon_tip')}">DXF</button>`;
    soon.textContent=t('phase1');
    status.innerHTML=`<span class="pill">7 ${t('st_panels')}</span><span class="pill">5 ${t('st_used')}</span><span>${t('st_shaker')}: <b>336 × 645 mm</b></span><div class="spacer"></div><span>${t('st_total')}: <b>£2,480</b></span>`;
    optTitle.textContent=t('options');lblTheme.textContent=t('theme');lblLang.textContent=t('language');
    thLight.textContent=t('light');thDark.textContent=t('dark');
    thLight.className=theme==='light'?'on':'';thDark.className=theme==='dark'?'on':'';
    lgEn.className=lang==='en'?'on':'';lgPt.className=lang==='pt'?'on':'';
  }
  function renderCrumbs(){crumbs.innerHTML=`Bedroom 2 › Wall 1 › <b>${selected.name}</b>`;}

  function renderAll(){renderChrome();renderTree();renderInspector();renderCanvas();renderCrumbs();}

  // ===== interactions =====
  function select(type,name){selected={type,name};renderTree();renderInspector();renderCanvas();renderCrumbs();}
  function setTheme(th){theme=th;app.classList.toggle('dark',th==='dark');renderChrome();renderCanvas();}
  function setLang(l){lang=l;document.documentElement.lang=l;renderAll();}
  function toggleOpt(e){if(e)e.stopPropagation();optpop.classList.toggle('show');}
  document.addEventListener('click',e=>{if(!optpop.contains(e.target)&&e.target.id!=='gear')optpop.classList.remove('show');});

  renderAll();
</script>
</body>
</html>
