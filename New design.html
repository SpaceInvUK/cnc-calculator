<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FAST CNC — New Design</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

  /* LIGHT theme (default) */
  .app{display:grid;grid-template-columns:236px 1fr 314px;grid-template-rows:50px 60px 1fr 30px;height:100vh;width:100vw;
    --bg:#f5f8f7;--chrome:#ffffff;--chrome-tx:#0f172a;--rail-ico:#0f766e;--accent:#0d9488;
    --panel:#ffffff;--bd:#e6ece9;--text:#0f172a;--muted:#7b8794;--canvas:#ffffff;--soft:#f1f6f4;--hover:#eef4f2;
    --radius:12px;--shadow:0 4px 16px rgba(15,40,30,.07);--disabled:#b8c2bd}
  /* DARK theme (truly dark everywhere) */
  .app.dark{--bg:#0e1116;--chrome:#161a20;--chrome-tx:#e6e9ee;--rail-ico:#aeb6c2;--accent:#3b82f6;
    --panel:#171b21;--bd:#2a3038;--text:#e6e9ee;--muted:#8b93a1;--canvas:#0b0d11;--soft:#222833;--hover:#262d38;
    --radius:12px;--shadow:0 6px 20px rgba(0,0,0,.5);--disabled:#5b6470}

  .topbar{grid-column:1/4;grid-row:1;background:var(--chrome);color:var(--chrome-tx);display:flex;align-items:center;gap:16px;
    padding:0 16px;border-bottom:1px solid var(--bd)}
  .logo{font-weight:900;letter-spacing:.5px;font-size:15px;display:flex;align-items:center;gap:8px}
  .logo .dot{width:11px;height:11px;border-radius:3px;background:var(--accent)}
  .menu{display:flex;gap:14px;font-size:13px;opacity:.85}.menu span{cursor:pointer}
  .topbar .spacer{flex:1}
  .ttool{display:flex;gap:6px;align-items:center}
  .ttool button{display:flex;align-items:center;gap:6px;border:0;border-radius:8px;padding:7px 12px;font-weight:700;
    font-size:12px;cursor:pointer;background:var(--soft);color:var(--text)}
  .ttool button.icobtn{width:34px;height:34px;padding:0;justify-content:center;font-size:15px}
  .ttool button.primary{background:var(--accent);color:#fff}

  .optpop{position:absolute;top:52px;right:14px;z-index:40;background:var(--panel);border:1px solid var(--bd);
    border-radius:12px;box-shadow:var(--shadow);padding:12px 14px;min-width:210px;display:none}
  .optpop.show{display:block}
  .optpop .ttl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;margin-bottom:10px}
  .optrow{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:10px;font-size:12.5px}
  .optrow:last-child{margin-bottom:0}

  .rail{grid-column:1/4;grid-row:2;background:var(--chrome);display:flex;flex-direction:row;align-items:center;gap:2px;padding:0 12px;border-bottom:1px solid var(--bd)}
  .rail .tool{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-width:52px;padding:6px 10px;border-radius:9px;cursor:pointer;color:var(--rail-ico)}
  .rail .tool .ti{display:flex}
  .rail .tool .ti svg{width:20px;height:20px}
  .rail .tool .tl{font-size:9.5px;font-weight:700;line-height:1;white-space:nowrap}
  .rail .tool:hover{background:var(--hover)}
  .rail .tool.on{background:var(--accent);color:#fff}
  .rail .tool.disabled{opacity:.4;cursor:not-allowed}
  .rail .sep{width:1px;height:26px;background:var(--bd);margin:0 4px}

  .tree{grid-column:1;grid-row:3;background:var(--panel);border-right:1px solid var(--bd);overflow:auto;padding:10px}
  .tree h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:6px 6px 8px}
  .node{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text)}
  .node:hover{background:var(--hover)}
  .node.sel{background:color-mix(in srgb,var(--accent) 18%,transparent);font-weight:700;color:var(--accent)}
  .node .ic{width:15px;height:15px;opacity:.85;display:flex}
  .node .tag{margin-left:auto;font-size:10px;color:var(--muted)}
  .roomcard{border:1px solid var(--bd);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
  .roomcard>.node{border-radius:0}

  .stage{grid-column:2;grid-row:3;background:var(--canvas);position:relative;overflow:hidden;display:flex;flex-direction:column}
  .crumbs{position:absolute;top:12px;left:14px;font-size:12px;color:var(--muted);z-index:2;background:var(--panel);
    border:1px solid var(--bd);padding:6px 12px;border-radius:999px;box-shadow:var(--shadow)}
  .crumbs b{color:var(--accent)}
  .walltabs{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:3;display:flex;gap:5px;max-width:46%;overflow:auto}
  .walltabs button{border:1px solid var(--bd);background:var(--panel);border-radius:8px;height:30px;padding:0 12px;font-size:11.5px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;box-shadow:var(--shadow)}
  .walltabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .viewcube{position:absolute;top:12px;right:14px;display:flex;gap:5px;z-index:2}
  .viewcube button{border:1px solid var(--bd);background:var(--panel);border-radius:8px;min-width:34px;height:30px;font-size:11px;font-weight:800;color:var(--muted);cursor:pointer;padding:0 8px}
  .viewcube button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .viewcube button.disabled{opacity:.45;cursor:not-allowed}
  .canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:56px 30px 34px}
  .canvas-wrap svg{width:100%;height:100%;max-width:900px}
  .canvas-wrap svg .pk{cursor:pointer}
  .zoombar{position:absolute;bottom:14px;left:14px;display:flex;gap:4px;z-index:2}
  .zoombar button{border:1px solid var(--bd);background:var(--panel);width:30px;height:30px;border-radius:8px;font-size:15px;font-weight:800;color:var(--muted);cursor:pointer;box-shadow:var(--shadow)}
  .soon{position:absolute;bottom:14px;right:14px;font-size:10.5px;color:var(--muted);background:var(--panel);border:1px dashed var(--bd);padding:4px 10px;border-radius:999px;max-width:50%}

  .insp{grid-column:3;grid-row:3;background:var(--panel);border-left:1px solid var(--bd);overflow:auto}
  .ihead{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
  .ihead .pic{width:34px;height:34px;border-radius:9px;background:color-mix(in srgb,var(--accent) 18%,transparent);display:flex;align-items:center;justify-content:center;color:var(--accent)}
  .ihead .t{font-weight:800;font-size:14px}.ihead .s{font-size:11px;color:var(--muted)}
  .ihead .rm{margin-left:auto;border:1px solid var(--bd);background:var(--soft);color:var(--muted);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:13px}
  .ihead .rm:hover{color:#dc2626;border-color:#dc2626}
  .sec{padding:12px 16px;border-bottom:1px solid var(--bd)}
  .sec .lab{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;margin-bottom:10px}
  .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}
  .row:last-child{margin-bottom:0}
  .row label{font-size:12.5px;color:var(--text)}
  .row .val{font-size:12.5px;font-weight:700;background:var(--soft);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;min-width:64px;text-align:center}
  .row input.val{width:80px;font-family:inherit;outline:none}
  .row input.val:focus{border-color:var(--accent)}
  .seg{display:flex;background:var(--soft);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
  .seg span{padding:5px 11px;font-size:11.5px;font-weight:700;color:var(--muted);cursor:pointer}
  .seg span.on{background:var(--accent);color:#fff}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:11px;font-weight:700;padding:5px 9px;border-radius:999px;background:var(--soft);border:1px solid var(--bd);color:var(--text)}
  .chip.warn{background:color-mix(in srgb,#f59e0b 22%,var(--panel));border-color:#d9942a;color:var(--text)}

  .status{grid-column:1/4;grid-row:4;background:var(--chrome);color:var(--chrome-tx);display:flex;align-items:center;gap:18px;padding:0 16px;font-size:12px;border-top:1px solid var(--bd)}
  .status .pill{background:var(--soft);padding:3px 10px;border-radius:999px;font-weight:700}
  .status .spacer{flex:1}.status b{color:var(--accent)}
</style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar">
      <div class="logo"><span class="dot"></span> FAST CNC</div>
      <div class="menu" id="menu"></div>
      <div class="spacer"></div>
      <div class="ttool">
        <input type="file" id="fileInput" accept=".json" style="display:none">
        <button class="icobtn" id="openBtn" title="Open quote / project (.json)" onclick="document.getElementById('fileInput').click()">📂</button>
        <button class="icobtn" id="saveBtn" title="Save project (.json)" onclick="saveProject()">💾</button>
        <button class="icobtn" id="gear" title="Options" onclick="toggleOpt(event)">⚙</button>
        <button>↶</button><button>↷</button>
        <button class="primary" id="exportBtn">⬇ Export DXF</button>
      </div>
    </div>
    <div class="optpop" id="optpop">
      <div class="ttl" id="optTitle">Options</div>
      <div class="optrow"><span id="lblTheme">Theme</span>
        <div class="seg"><span id="thLight" onclick="setTheme('light')">Light</span><span id="thDark" onclick="setTheme('dark')">Dark</span></div></div>
      <div class="optrow"><span id="lblLang">Language</span>
        <div class="seg"><span id="lgEn" onclick="setLang('en')">EN</span><span id="lgPt" onclick="setLang('pt')">PT</span></div></div>
    </div>

    <div class="rail" id="rail"></div>
    <div class="tree" id="tree"></div>

    <div class="stage">
      <div class="crumbs" id="crumbs"></div>
      <div class="walltabs" id="walltabs"></div>
      <div class="viewcube" id="viewcube"></div>
      <div class="canvas-wrap" id="canvas"></div>
      <div class="zoombar"><button>+</button><button>−</button><button>⤢</button></div>
      <div class="soon" id="soon"></div>
    </div>

    <div class="insp" id="insp"></div>
    <div class="status" id="status"></div>
  </div>

<script>
  // ===== i18n (English default) =====
  const STR={
    en:{m_file:'File',m_edit:'Edit',m_view:'View',m_insert:'Insert',m_export:'Export',
      tool_select:'Select',tool_wall:'Wall',tool_door:'Door',tool_window:'Window',tool_object:'Object',tool_panel:'Panel',tool_measure:'Measure',tool_pan:'Pan',tool_zoom:'Zoom',tool_export:'Export',
      project:'Project',addroom:'+ Add room',sheets:'sheets',exportdxf:'Export DXF',
      soon_tip:'Coming soon (not programmed yet)',phase1:'Phase 2a · live editing — exact balancing, nesting & DXF next',
      options:'Options',theme:'Theme',light:'Light',dark:'Dark',language:'Language',
      st_panels:'panels',st_shaker:'Shaker',st_total:'Total',s_pricing:'Pricing',f_sheets:'Sheets',f_matcost:'Material £/sheet',f_cnccost:'CNC £/sheet',f_roomtotal:'Room total',
      s_shaker:'Shaker',s_siderules:'Side rules',s_offset:'Offset / Pocketing',s_material:'Material',s_door:'Door',
      s_siderule:'Side rule',s_window:'Window',s_object:'Object',s_toppanel:'Top panel',s_wall:'Wall',s_finish:'Finish',s_room:'Room',
      f_type:'Type',f_frame:'Frame (mm)',f_size:'Shaker target (mm)',f_columns:'Columns',f_rows:'Rows',f_top:'Top',f_right:'Right',f_bottom:'Bottom',f_left:'Left',
      f_width:'Width (mm)',f_height:'Height (mm)',f_posx:'Position X',f_measfrom:'Measure X from',f_sill:'Sill (mm)',
      f_name:'Name',f_base:'Base (mm)',f_createtop:'Create top panel',f_bottomshaker:'Bottom to Shaker',
      f_paneldir:'Panel direction',f_panelheight:'Panel height',f_material:'Material',f_thickness:'Thickness',f_skirting:'Skirting',f_skirtingh:'Skirting height',f_panelsbeside:'Panels beside',
      v_auto:'Auto',v_lock:'Lock',v_h:'Horizontal',v_v:'Vertical',v_yes:'Yes',v_no:'No',v_left:'Left',v_right:'Right',
      d_opening:'opening',d_room:'room'},
    pt:{m_file:'Arquivo',m_edit:'Editar',m_view:'Ver',m_insert:'Inserir',m_export:'Exportar',
      tool_select:'Selecionar',tool_wall:'Parede',tool_door:'Porta',tool_window:'Janela',tool_object:'Objeto',tool_panel:'Painel',tool_measure:'Medir',tool_pan:'Mover',tool_zoom:'Zoom',tool_export:'Exportar',
      project:'Projeto',addroom:'+ Adicionar room',sheets:'chapas',exportdxf:'Exportar DXF',
      soon_tip:'Em breve (ainda não programado)',phase1:'Fase 2a · edição ao vivo — balanceamento exato, nesting e DXF a seguir',
      options:'Opções',theme:'Tema',light:'Claro',dark:'Escuro',language:'Idioma',
      st_panels:'painéis',st_shaker:'Shaker',st_total:'Total',s_pricing:'Preço',f_sheets:'Chapas',f_matcost:'Material £/chapa',f_cnccost:'CNC £/chapa',f_roomtotal:'Total do room',
      s_shaker:'Shaker',s_siderules:'Regras de lado',s_offset:'Offset / Pocketing',s_material:'Material',s_door:'Porta',
      s_siderule:'Regra do lado',s_window:'Janela',s_object:'Objeto',s_toppanel:'Painel em cima',s_wall:'Parede',s_finish:'Acabamento',s_room:'Room',
      f_type:'Tipo',f_frame:'Frame (mm)',f_size:'Alvo do shaker (mm)',f_columns:'Colunas',f_rows:'Linhas',f_top:'Topo',f_right:'Direita',f_bottom:'Baixo',f_left:'Esquerda',
      f_width:'Largura (mm)',f_height:'Altura (mm)',f_posx:'Posição X',f_measfrom:'Medir X de',f_sill:'Peitoril (mm)',
      f_name:'Nome',f_base:'Base (mm)',f_createtop:'Criar painel no topo',f_bottomshaker:'Bottom to Shaker',
      f_paneldir:'Direção painel',f_panelheight:'Altura painel',f_material:'Material',f_thickness:'Espessura',f_skirting:'Skirting',f_skirtingh:'Altura skirting',f_panelsbeside:'Painéis ao lado',
      v_auto:'Auto',v_lock:'Lock',v_h:'Horizontal',v_v:'Vertical',v_yes:'Sim',v_no:'Não',v_left:'Esq',v_right:'Dir',
      d_opening:'abertura',d_room:'cômodo'}
  };
  let lang='en', theme='light';
  const t=k=>(STR[lang]&&STR[lang][k])||STR.en[k]||k;

  // ===== icons =====
  const ICONS={cursor:'M4 3l16 7-7 2-2 7z',wall:'M3 5h18v14H3z M3 10h18 M9 5v5 M15 10v9',door:'M6 3h9v18H6z M12 12h.01 M15 3l3 2v16h-3',
    window:'M4 4h16v16H4z M12 4v16 M4 12h16',object:'M4 8l8-4 8 4-8 4z M4 8v8l8 4 8-4V8',panel:'M4 3h16v18H4z M10 3v18 M4 9h6 M14 15h6',
    ruler:'M3 8l13 13 5-5L8 3z M8 8l2 2 M12 7l2 2 M7 12l2 2',hand:'M7 11V6a2 2 0 014 0v5 M11 6a2 2 0 014 0v5 M15 8a2 2 0 014 0v7a5 5 0 01-5 5h-3l-4-4',
    zoom:'M10 4a6 6 0 100 12 6 6 0 000-12z M20 20l-5-5',add:'M12 5v14 M5 12h14',dxf:'M6 2h9l5 5v15H6z M14 2v6h6'};
  const svgIcon=(n,sw)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw||1.7}" stroke-linecap="round" stroke-linejoin="round"><path d="${ICONS[n]||''}"/></svg>`;

  const TOOLGROUPS=[
    [['cursor','select',1]],
    [['wall','wall'],['door','door'],['window','window'],['object','object'],['panel','panel']],
    [['ruler','measure'],['hand','pan'],['zoom','zoom']]
  ];

  // ===== data model =====
  const MODEL={rooms:[
    {id:'r1',name:'Bedroom 2',material:'MDF Hidrófugo',thickness:'22mm',frame:80,doorAllow:175,skirting:'yes',skirtingH:225,sheets:5,
      walls:[{id:'w1',name:'Wall 1',width:5909,height:3200,panelDir:'vertical',panelHeight:2800,colTarget:340,openings:[
        {id:'o1',type:'object',name:'BED',width:2000,height:1600,x:750,bottom:0},
        {id:'o2',type:'door',name:'Door',width:820,height:2100,x:4134,bottom:0}]}]},
    {id:'r2',name:'Ensuite 2',material:'MDF Hidrófugo',thickness:'22mm',frame:80,doorAllow:175,skirting:'yes',skirtingH:225,sheets:4,
      walls:[{id:'w2',name:'Wall 1',width:1911,height:3200,panelDir:'horizontal',panelHeight:1030,colTarget:340,openings:[]}]},
    {id:'r3',name:'Principle bedroom',material:'MDF Hidrófugo',thickness:'22mm',frame:80,doorAllow:175,skirting:'yes',skirtingH:225,sheets:3,
      walls:[{id:'w3',name:'Wall 1',width:3500,height:3200,panelDir:'vertical',panelHeight:3000,colTarget:340,openings:[
        {id:'o3',type:'object',name:'Bed',width:2000,height:1600,x:750,bottom:0}]}]}
  ]};
  MODEL.rooms.forEach(r=>{if(r.matCost==null)r.matCost=70;if(r.cncCost==null)r.cncCost=330;});
  try{const _s=JSON.parse(localStorage.getItem('fnd_model')||'null');if(_s&&Array.isArray(_s.rooms)&&_s.rooms.length)MODEL.rooms=_s.rooms;}catch(_e){}
  function saveModel(){try{localStorage.setItem('fnd_model',JSON.stringify({rooms:MODEL.rooms}));}catch(_e){}}
  let sel={kind:'wall',room:MODEL.rooms[0],wall:MODEL.rooms[0].walls[0],op:null,panelId:null};
  let view={room:MODEL.rooms[0],wall:MODEL.rooms[0].walls[0]};

  // ===== shaker balancing (ported from production equalShakersForSpan) =====
  const SHK_MIN=150,SHK_MAX=700;
  function balancedCount(inner,frame,target){
    inner=Math.max(0,inner);target=Math.max(1,target||340);frame=Math.max(0,frame);
    if(!(inner>0))return 1;
    const maxCount=Math.min(999,Math.max(1,Math.floor((inner+frame)/Math.max(1,SHK_MIN+frame))+2));
    let best=null;
    for(let count=1;count<=maxCount;count++){const each=(inner-frame*Math.max(0,count-1))/count;if(!(each>0))continue;
      const outside=each<SHK_MIN?SHK_MIN-each:(each>SHK_MAX?each-SHK_MAX:0);
      const natural=Math.max(1,Math.round((inner+frame)/(target+frame)));
      const splitPen=count>natural?(count-natural)*2:0;
      const score=outside*1000+Math.abs(each-target)+splitPen+Math.abs(count-natural)*0.25;
      if(!best||score<best.score)best={count,score};}
    return best?best.count:1;
  }
  // ===== layout engine (model-driven geometry) =====
  function layoutWall(wall,room){
    const W=+wall.width,H=+wall.height,frame=+room.frame,da=+room.doorAllow||175,target=+wall.colTarget||340;
    const maxW=wall.panelDir==='vertical'?1206:2400;
    const sv=r=>r==='joint'?frame/2:(r==='door'?da:frame);
    const ops=(wall.openings||[]).map(o=>({...o,x:+o.x,width:+o.width,height:+o.height,bottom:+(o.bottom||0)})).sort((a,b)=>a.x-b.x);
    const spans=[];let cursor=0,leftRule='normal';
    ops.forEach(o=>{const x0=Math.max(0,Math.min(W,o.x)),x1=Math.max(x0,Math.min(W,o.x+o.width));
      const r=o.type==='door'?'door':'normal';
      if(x0>cursor+0.5)spans.push({x0:cursor,x1:x0,lr:leftRule,rr:r});
      cursor=Math.max(cursor,x1);leftRule=r;});
    if(cursor<W-0.5)spans.push({x0:cursor,x1:W,lr:leftRule,rr:'normal'});
    const panels=[];let pid=0;
    function addPanel(x0,x1,lr,rr,y0,y1,cap){const pw=x1-x0;if(pw<=2)return;
      const np=Math.max(1,Math.ceil(pw/maxW)),ew=pw/np;
      for(let i=0;i<np;i++){const px0=x0+i*ew,l=i===0?lr:'joint',r=i===np-1?rr:'joint',lf=sv(l),rf=sv(r);
        const inner=Math.max(0,ew-lf-rf);
        const cols=balancedCount(inner,frame,target);
        pid++;panels.push({id:'p'+pid,label:'P'+pid,x0:px0,x1:px0+ew,y0,y1,lf,rf,cols:Math.max(1,cols),cap:!!cap,leftRule:l,rightRule:r});}}
    spans.forEach(sp=>addPanel(sp.x0,sp.x1,sp.lr,sp.rr,0,H,false));
    ops.forEach(o=>{const top=o.bottom+o.height;if(top<H-1)addPanel(o.x,o.x+o.width,'joint','joint',top,H,true);
      if(o.type==='window'&&o.bottom>1)addPanel(o.x,o.x+o.width,'joint','joint',0,o.bottom,true);});
    return {W,H,frame,ops,panels};
  }
  const ruleName=r=>r==='joint'?'Joint':(r==='door'?'Door':'Normal');

  // ===== inspector (one contextual panel, editable) =====
  const SEC=(lab,body)=>`<div class="sec"><div class="lab">${lab}</div>${body}</div>`;
  const RO=(l,v)=>`<div class="row"><label>${l}</label><div class="val">${v}</div></div>`;
  const NUM=(l,f,v)=>`<div class="row"><label>${l}</label><input class="val" type="number" value="${v==null?'':v}" onchange="edit('${f}',this.value)"></div>`;
  const TXT=(l,f,v)=>`<div class="row"><label>${l}</label><input class="val" type="text" value="${v==null?'':v}" onchange="edit('${f}',this.value)"></div>`;
  const SEGE=(l,f,opts,val)=>`<div class="row"><label>${l}</label><div class="seg">${opts.map(o=>`<span class="${o[0]===val?'on':''}" onclick="editSeg('${f}','${o[0]}')">${o[1]}</span>`).join('')}</div></div>`;
  function selPanel(){if(sel.kind!=='panel'||!view.wall)return null;return layoutWall(view.wall,view.room).panels.find(p=>p.id===sel.panelId)||null;}
  function inspectorBody(){
    if(sel.kind==='room'){const r=sel.room;
      return SEC(t('s_room'),TXT(t('f_name'),'name',r.name)+NUM(t('f_frame'),'frame',r.frame)+TXT(t('f_material'),'material',r.material)+TXT(t('f_thickness'),'thickness',r.thickness))
        +SEC(t('s_finish'),SEGE(t('f_skirting'),'skirting',[['yes',t('v_yes')],['no',t('v_no')]],r.skirting)+NUM(t('f_skirtingh'),'skirtingH',r.skirtingH))
        +SEC(t('s_pricing'),NUM(t('f_sheets'),'sheets',r.sheets)+NUM(t('f_matcost'),'matCost',r.matCost)+NUM(t('f_cnccost'),'cncCost',r.cncCost)+RO(t('f_roomtotal'),money(roomTotal(r))));}
    if(sel.kind==='wall'){const w=sel.wall;
      return SEC(t('s_wall'),NUM(t('f_width'),'width',w.width)+NUM(t('f_height'),'height',w.height)+SEGE(t('f_paneldir'),'panelDir',[['horizontal',t('v_h')],['vertical',t('v_v')]],w.panelDir)+NUM(t('f_panelheight'),'panelHeight',w.panelHeight))
        +SEC(t('s_shaker'),NUM(t('f_size'),'colTarget',w.colTarget));}
    if(sel.kind==='opening'){const o=sel.op;
      if(o.type==='door')return SEC(t('s_door'),TXT(t('f_name'),'name',o.name)+NUM(t('f_width'),'width',o.width)+NUM(t('f_height'),'height',o.height)+NUM(t('f_posx'),'x',o.x))+SEC(t('s_siderule'),RO(t('f_panelsbeside'),'Door = '+((+sel.room.doorAllow)||175)));
      if(o.type==='window')return SEC(t('s_window'),TXT(t('f_name'),'name',o.name)+NUM(t('f_width'),'width',o.width)+NUM(t('f_height'),'height',o.height)+NUM(t('f_sill'),'bottom',o.bottom)+NUM(t('f_posx'),'x',o.x));
      return SEC(t('s_object'),TXT(t('f_name'),'name',o.name)+NUM(t('f_width'),'width',o.width)+NUM(t('f_height'),'height',o.height)+NUM(t('f_base'),'bottom',o.bottom))+SEC(t('s_toppanel'),RO(t('f_createtop'),t('v_yes')));}
    const p=selPanel(),w=view.wall;
    return SEC(t('s_shaker'),SEGE(t('f_type'),'shakerType',[['shaker','Shaker'],['flat','Flat'],['reeded','Reeded']],w.shakerType||'shaker')+RO(t('f_columns'),p?p.cols:'—')+NUM(t('f_size'),'colTarget',w.colTarget)+SEGE(t('f_paneldir'),'panelDir',[['horizontal',t('v_h')],['vertical',t('v_v')]],w.panelDir))
      +SEC(t('s_siderules'),RO(t('f_left'),p?ruleName(p.leftRule):'—')+RO(t('f_right'),p?ruleName(p.rightRule):'—'))
      +SEC(t('s_offset'),'<div class="chips"><span class="chip">A 0</span><span class="chip">B 6</span><span class="chip">C 8</span><span class="chip">D 19</span><span class="chip">E 25</span><span class="chip">F 28.5</span><span class="chip warn">Back 80</span></div>');
  }
  function titleFor(){if(sel.kind==='room')return sel.room.name;if(sel.kind==='wall')return sel.wall.name;if(sel.kind==='opening')return sel.op.name;const p=selPanel();return 'Panel '+(p?p.label:'');}
  function subFor(){const rn=view.room?view.room.name:'',wn=view.wall?view.wall.name:'';
    if(sel.kind==='room')return t('d_room');
    if(sel.kind==='wall')return rn;
    if(sel.kind==='opening')return rn+' · '+wn+' · '+t('d_opening');
    return rn+' · '+wn;}
  function inspIcon(){if(sel.kind==='room')return 'panel';if(sel.kind==='wall')return 'wall';if(sel.kind==='opening')return sel.op.type;return 'panel';}
  function renderInspector(){const rm=(sel.kind==='opening'||sel.kind==='wall'||sel.kind==='room');
    insp.innerHTML=`<div class="ihead"><div class="pic">${svgIcon(inspIcon(),1.7)}</div><div style="flex:1"><div class="t">${titleFor()}</div><div class="s">${subFor()}</div></div>${rm?'<button class="rm" onclick="removeSel()" title="Remove">🗑</button>':''}</div>`+inspectorBody();}

  // ===== tree =====
  function renderTree(){let h=`<h4>${t('project')}</h4>`;
    MODEL.rooms.forEach(r=>{h+='<div class="roomcard">';
      const rsel=sel.kind==='room'&&sel.room===r?'sel':'';
      h+=`<div class="node ${rsel}" data-k="room" data-r="${r.id}"><span class="ic">${svgIcon('panel',1.6)}</span> ${r.name}<span class="tag">${r.sheets} ${t('sheets')}</span></div>`;
      r.walls.forEach(w=>{const wsel=sel.kind==='wall'&&sel.wall===w?'sel':'';
        h+=`<div class="node ${wsel}" data-k="wall" data-r="${r.id}" data-w="${w.id}" style="margin-left:18px"><span class="ic">${svgIcon('wall',1.6)}</span> ${w.name} · ${w.width}×${w.height}</div>`;
        if(view.wall===w)(w.openings||[]).forEach(o=>{const osel=sel.kind==='opening'&&sel.op===o?'sel':'';
          h+=`<div class="node ${osel}" data-k="op" data-o="${o.id}" style="margin-left:36px"><span class="ic">${svgIcon(o.type,1.6)}</span> ${o.name}</div>`;});});
      h+='</div>';});
    h+=`<div class="roomcard"><div class="node" style="color:var(--muted)" onclick="addRoom()"><span class="ic">${svgIcon('add',1.6)}</span> ${t('addroom')}</div></div>`;
    tree.innerHTML=h;
    tree.querySelectorAll('.node[data-k]').forEach(n=>{const k=n.dataset.k;
      n.onclick=()=>{if(k==='room')selectRoom(n.dataset.r);else if(k==='wall')selectWall(n.dataset.r,n.dataset.w);else if(k==='op')selectOpening(n.dataset.o);};});}

  // ===== canvas (theme-aware, model-driven) =====
  const PAL={light:{wall:'#f8fafc',wallBd:'#94a3b8',floor:'#475569',dim:'#64748b',pFill:'#dcfce7',pBd:'#16a34a',cell:'#ffffff',capFill:'#dbeafe',capBd:'#2563eb',obj:'#eef2f7',objBd:'#94a3b8',door:'#fde7ef',doorBd:'#db2777',lab:'#475569',sel:'#2563eb'},
    dark:{wall:'#11151c',wallBd:'#3a424e',floor:'#6b7686',dim:'#9aa3b2',pFill:'#15311f',pBd:'#22c55e',cell:'#10151b',capFill:'#16233f',capBd:'#3b82f6',obj:'#161b22',objBd:'#3a424e',door:'#371728',doorBd:'#ec4899',lab:'#c3cad6',sel:'#60a5fa'}};
  const pal=()=>PAL[theme];
  function renderCanvas(){const P=pal(),wall=view.wall,room=view.room;if(!wall){canvas.innerHTML='';return;}
    const L=layoutWall(wall,room),W=L.W,H=L.H;
    const VB_W=880,VB_H=400,X=48,Yt=44,drawW=VB_W-X-34,drawH=VB_H-Yt-46,floorY=Yt+drawH;
    const sx=drawW/W,sy=drawH/H,MX=x=>X+x*sx,MY=hh=>floorY-hh*sy;
    let s=`<svg viewBox="0 0 ${VB_W} ${VB_H}">`;
    s+=`<rect x="${X}" y="${Yt}" width="${drawW}" height="${drawH}" fill="${P.wall}" stroke="${P.wallBd}" stroke-width="1.5"/>`;
    s+=`<line x1="${X-10}" y1="${floorY}" x2="${X+drawW+10}" y2="${floorY}" stroke="${P.floor}" stroke-width="2"/>`;
    s+=`<text x="${X+drawW/2}" y="${Yt-18}" text-anchor="middle" font-size="12" fill="${P.dim}">${W} mm</text>`;
    s+=`<text x="${X-26}" y="${Yt+drawH/2}" text-anchor="middle" font-size="12" fill="${P.dim}" transform="rotate(-90 ${X-26} ${Yt+drawH/2})">${H} mm</text>`;
    const tf=L.frame*sy,bf=(room.skirting==='yes'?(+room.skirtingH+L.frame):L.frame)*sy,gap=L.frame*sx;
    L.panels.forEach(p=>{const x=MX(p.x0),w=(p.x1-p.x0)*sx,yTop=MY(p.y1),h=(p.y1-p.y0)*sy;
      const stroke=p.cap?P.capBd:P.pBd,fill=p.cap?P.capFill:P.pFill,selp=sel.kind==='panel'&&sel.panelId===p.id;
      s+=`<g class="pk" data-k="panel" data-id="${p.id}"><rect x="${x}" y="${yTop}" width="${w}" height="${h}" rx="3" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`;
      const ix=x+p.lf*sx,iw=Math.max(0,w-(p.lf+p.rf)*sx),iy=yTop+tf,ih=Math.max(0,h-tf-bf),cols=p.cols,cw=(iw-gap*(cols-1))/cols;
      for(let i=0;i<cols;i++){const cx=ix+i*(cw+gap);s+=`<rect x="${cx}" y="${iy}" width="${Math.max(0,cw)}" height="${ih}" rx="2" fill="${P.cell}" stroke="${stroke}" stroke-width="1"/>`;
        for(let rr=1;rr<3;rr++){const lx=cx+cw*rr/3;s+=`<line x1="${lx}" y1="${iy+3}" x2="${lx}" y2="${iy+ih-3}" stroke="${stroke}" stroke-opacity=".4"/>`;}}
      s+=`<text x="${x+w/2}" y="${yTop-5}" text-anchor="middle" font-size="10" font-weight="700" fill="${selp?P.sel:P.lab}">${p.label}</text>`;
      if(selp)s+=`<rect x="${x-3}" y="${yTop-3}" width="${w+6}" height="${h+6}" rx="5" fill="none" stroke="${P.sel}" stroke-width="2"/>`;
      s+='</g>';});
    L.ops.forEach(o=>{const x=MX(o.x),w=o.width*sx,yTop=MY(o.bottom+o.height),h=o.height*sy;
      const isDoor=o.type==='door',isWin=o.type==='window',fill=isDoor?P.door:(isWin?P.capFill:P.obj),bd=isDoor?P.doorBd:(isWin?P.capBd:P.objBd);
      const selo=sel.kind==='opening'&&sel.op&&sel.op.id===o.id;
      s+=`<g class="pk" data-k="op" data-id="${o.id}"><rect x="${x}" y="${yTop}" width="${w}" height="${h}" rx="3" fill="${fill}" stroke="${bd}" stroke-width="1.5" ${o.type==='object'?'stroke-dasharray="5 4"':''}/>`;
      s+=`<text x="${x+w/2}" y="${yTop+h/2+4}" text-anchor="middle" font-size="12" font-weight="800" fill="${bd}">${o.name}</text>`;
      if(selo)s+=`<rect x="${x-3}" y="${yTop-3}" width="${w+6}" height="${h+6}" rx="5" fill="none" stroke="${P.sel}" stroke-width="2"/>`;
      s+='</g>';});
    s+='</svg>';canvas.innerHTML=s;
    canvas.querySelectorAll('.pk').forEach(g=>g.onclick=()=>{g.dataset.k==='op'?selectOpening(g.dataset.id):selectPanel(g.dataset.id);});}

  // ===== chrome / status / crumbs =====
  function renderChrome(){
    menu.innerHTML=['m_file','m_edit','m_view','m_insert','m_export'].map(k=>`<span>${t(k)}</span>`).join('');
    rail.innerHTML=TOOLGROUPS.map(g=>g.map(x=>`<div class="tool ${x[2]?'on':''}" data-act="${x[1]}" title="${t('tool_'+x[1])}"><span class="ti">${svgIcon(x[0])}</span><span class="tl">${t('tool_'+x[1])}</span></div>`).join('')).join('<div class="sep"></div>');
    rail.querySelectorAll('.tool[data-act]').forEach(el=>el.onclick=()=>toolAction(el.dataset.act));
    exportBtn.textContent='⬇ '+t('exportdxf');
    viewcube.innerHTML=`<button class="on">2D</button><button class="disabled" title="${t('soon_tip')}">2.5D</button><button class="disabled" title="${t('soon_tip')}">DXF</button>`;
    soon.textContent=t('phase1');
    optTitle.textContent=t('options');lblTheme.textContent=t('theme');lblLang.textContent=t('language');
    thLight.textContent=t('light');thDark.textContent=t('dark');
    thLight.className=theme==='light'?'on':'';thDark.className=theme==='dark'?'on':'';
    lgEn.className=lang==='en'?'on':'';lgPt.className=lang==='pt'?'on':'';}
  const money=n=>'£'+Math.round(+n||0).toLocaleString();
  const roomTotal=r=>(+r.sheets||0)*((+r.matCost||0)+(+r.cncCost||0));
  const projectTotal=()=>MODEL.rooms.reduce((s,r)=>s+roomTotal(r),0);
  function renderStatus(){const w=view.wall,r=view.room,L=w?layoutWall(w,r):{panels:[]};
    let area=0;L.panels.forEach(p=>{area+=Math.max(0,p.x1-p.x0)*Math.max(0,p.y1-p.y0);});area=area/1e6;
    document.getElementById('status').innerHTML=`<span class="pill">${r?r.name:''}</span><span class="pill">${L.panels.length} ${t('st_panels')}</span>`+(w?`<span>${w.width} × ${w.height} mm · ≈ ${area.toFixed(2)} m²</span>`:'')+`<div class="spacer"></div><span class="pill">${t('st_total')}: ${money(projectTotal())}</span>`;}
  function renderCrumbs(){crumbs.innerHTML=`${view.room?view.room.name:''} › ${view.wall?view.wall.name:''} › <b>${titleFor()}</b>`;}
  function renderWallTabs(){const el=document.getElementById('walltabs'),r=view.room;
    if(!r||(r.walls||[]).length<2){el.innerHTML='';return;}
    el.innerHTML=r.walls.map(w=>`<button class="${view.wall===w?'on':''}" data-w="${w.id}">${w.name}</button>`).join('');
    el.querySelectorAll('button').forEach(b=>b.onclick=()=>selectWall(r.id,b.dataset.w));}

  // ===== interactions =====
  function renderAll(){renderChrome();renderTree();renderInspector();renderCanvas();renderCrumbs();renderWallTabs();renderStatus();saveModel();}
  function refresh(){renderTree();renderInspector();renderCanvas();renderCrumbs();renderWallTabs();renderStatus();saveModel();}
  function curObj(){if(sel.kind==='room')return sel.room;if(sel.kind==='wall')return sel.wall;if(sel.kind==='opening')return sel.op;if(sel.kind==='panel')return sel.wall;return null;}
  const coerce=v=>(v===''||v==null||isNaN(v))?v:Number(v);
  window.edit=(f,v)=>{const o=curObj();if(!o)return;o[f]=coerce(v);renderTree();renderCanvas();renderCrumbs();renderStatus();saveModel();};
  window.editSeg=(f,v)=>{const o=curObj();if(!o)return;o[f]=v;refresh();};
  function selectRoom(id){const r=MODEL.rooms.find(x=>x.id===id);if(!r)return;view={room:r,wall:r.walls[0]||null};sel={kind:'room',room:r,wall:view.wall,op:null,panelId:null};renderAll();}
  function selectWall(rid,wid){const r=MODEL.rooms.find(x=>x.id===rid),w=r.walls.find(x=>x.id===wid);view={room:r,wall:w};sel={kind:'wall',room:r,wall:w,op:null,panelId:null};renderAll();}
  function selectOpening(id){const w=view.wall,o=(w.openings||[]).find(x=>x.id===id);if(!o)return;sel={kind:'opening',room:view.room,wall:w,op:o,panelId:null};refresh();}
  function selectPanel(id){sel={kind:'panel',room:view.room,wall:view.wall,op:null,panelId:id};refresh();}
  // ===== create / delete =====
  let uid=100;
  function newOpening(type,w){const cx=Math.max(0,Math.round((+w.width)/2)-410);
    if(type==='door')return {id:'o'+(++uid),type:'door',name:'Door',width:820,height:2100,x:cx,bottom:0};
    if(type==='window')return {id:'o'+(++uid),type:'window',name:'Window',width:1200,height:1100,x:cx,bottom:900};
    return {id:'o'+(++uid),type:'object',name:'Object',width:1000,height:800,x:Math.max(0,Math.round((+w.width)/2)-500),bottom:0};}
  function toolAction(act){
    if(act==='wall')return addWall();
    if(act==='door'||act==='window'||act==='object')return addOpening(act);}
  function addRoom(){const id='r'+(++uid),wid='w'+(++uid);
    MODEL.rooms.push({id,name:'New room',material:'MDF',thickness:'18mm',frame:80,doorAllow:175,skirting:'no',skirtingH:225,sheets:1,matCost:70,cncCost:330,
      walls:[{id:wid,name:'Wall 1',width:3000,height:2400,panelDir:'vertical',panelHeight:2400,colTarget:340,openings:[]}]});
    selectRoom(id);}
  function addWall(){const r=view.room||sel.room;if(!r)return;const wid='w'+(++uid);
    r.walls.push({id:wid,name:'Wall '+(r.walls.length+1),width:3000,height:2400,panelDir:'vertical',panelHeight:2400,colTarget:340,openings:[]});
    selectWall(r.id,wid);}
  function addOpening(type){const w=view.wall;if(!w)return;const o=newOpening(type,w);(w.openings=w.openings||[]).push(o);
    sel={kind:'opening',room:view.room,wall:w,op:o,panelId:null};refresh();}
  function removeSel(){
    if(sel.kind==='opening'){const w=view.wall;w.openings=w.openings.filter(o=>o!==sel.op);selectWall(view.room.id,w.id);}
    else if(sel.kind==='wall'){const r=view.room;if(r.walls.length<=1)return;r.walls=r.walls.filter(w=>w!==sel.wall);selectRoom(r.id);}
    else if(sel.kind==='room'){if(MODEL.rooms.length<=1)return;MODEL.rooms=MODEL.rooms.filter(x=>x!==sel.room);selectRoom(MODEL.rooms[0].id);}}

  // ===== import a saved .fastcnc.json quote =====
  function importQuote(data){
    if(!data||!Array.isArray(data.blocks))throw new Error('not a FAST CNC quote');
    const rooms=[];let rn=0;
    data.blocks.forEach(b=>{
      if(String(b.calcMode)!=='panel')return;
      const parts=Array.isArray(b.parts)?b.parts:[];
      const walls=parts.map((p,i)=>{
        const dir=String(p.wallPanelDirection||b.panelDirection||'horizontal')==='vertical'?'vertical':'horizontal';
        const width=+p.wallWidth||+b.wallWidth||3000, height=+(p.wallHeight||b.wallHeight)||3200;
        const ph=dir==='vertical'?(+p.panelVerticalHeight||+b.panelVerticalHeight||3000):(+p.panelHorizontalHeight||+b.panelHorizontalHeight||1030);
        const ops=(Array.isArray(p.wallOpenings)?p.wallOpenings:[]).map(o=>{
          const ty=o.type==='door'?'door':(o.type==='window'?'window':'object');
          return {id:'o'+(++uid),type:ty,name:o.name||ty,width:+o.width||0,height:+o.height||0,x:+o.x||0,bottom:+(o.bottom||0)};
        }).filter(o=>o.width>0&&o.height>0);
        return {id:'w'+(++uid),name:'Wall '+(i+1),width,height,panelDir:dir,panelHeight:ph,colTarget:340,openings:ops};
      });
      if(!walls.length)walls.push({id:'w'+(++uid),name:'Wall 1',width:+b.wallWidth||3000,height:+b.wallHeight||3200,panelDir:'vertical',panelHeight:3000,colTarget:340,openings:[]});
      rooms.push({id:'r'+(++uid),name:b.roomName||('Room '+(++rn)),material:b.material||'MDF',thickness:b.thickness||'18mm',
        frame:+b.frameSize||80,doorAllow:+b.panelDoorAllowance||175,skirting:b.panelSkirtingEnabled==='Yes'?'yes':'no',
        skirtingH:+b.panelSkirtingHeight||225,sheets:+b.sheetQuantity||1,matCost:+b.materialCost||70,cncCost:+b.cncServiceCost||330,walls});
    });
    if(!rooms.length)throw new Error('no panel rooms found');
    MODEL.rooms=rooms;view={room:rooms[0],wall:rooms[0].walls[0]};sel={kind:'wall',room:rooms[0],wall:rooms[0].walls[0],op:null,panelId:null};
    renderAll();
  }

  // ===== basic DXF export (current wall) =====
  function dxfRect(layer,x0,y0,x1,y1){
    return `0\nLWPOLYLINE\n8\n${layer}\n90\n4\n70\n1\n10\n${x0}\n20\n${y0}\n10\n${x1}\n20\n${y0}\n10\n${x1}\n20\n${y1}\n10\n${x0}\n20\n${y1}\n`;
  }
  function buildDXF(wall,room){
    const L=layoutWall(wall,room),frame=L.frame,bottomF=room.skirting==='yes'?((+room.skirtingH||0)+frame):frame;
    let ent='';
    L.panels.forEach(p=>{
      ent+=dxfRect('PANEL',p.x0,p.y0,p.x1,p.y1);
      const innerX=p.x0+p.lf,innerW=(p.x1-p.x0)-p.lf-p.rf,cols=p.cols,cy0=p.y0+bottomF,cy1=p.y1-frame;
      if(innerW>0&&cy1>cy0){const cw=(innerW-frame*(cols-1))/cols;
        for(let i=0;i<cols;i++){const cx0=innerX+i*(cw+frame);ent+=dxfRect('SHAKER',cx0,cy0,cx0+cw,cy1);}}
    });
    L.ops.forEach(o=>{ent+=dxfRect('OPENING',o.x,o.bottom,o.x+o.width,o.bottom+o.height);});
    const tables='0\nSECTION\n2\nTABLES\n0\nTABLE\n2\nLAYER\n70\n3\n'+
      ['PANEL','SHAKER','OPENING'].map((n,i)=>`0\nLAYER\n2\n${n}\n70\n0\n62\n${[7,3,1][i]}\n6\nCONTINUOUS\n`).join('')+'0\nENDTAB\n0\nENDSEC\n';
    return '0\nSECTION\n2\nHEADER\n0\nENDSEC\n'+tables+'0\nSECTION\n2\nENTITIES\n'+ent+'0\nENDSEC\n0\nEOF\n';
  }
  function exportDXF(){const w=view.wall,r=view.room;if(!w)return;
    const blob=new Blob([buildDXF(w,r)],{type:'application/dxf'}),a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=((r.name||'room')+'_'+(w.name||'wall')).replace(/[^A-Za-z0-9_-]+/g,'_')+'.dxf';
    document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}

  // ===== save / load project (.json round-trip) =====
  function downloadJSON(obj,name){const blob=new Blob([JSON.stringify(obj,null,1)],{type:'application/json'}),a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
  function saveProject(){downloadJSON({app:'fast-cnc-newdesign',version:1,rooms:MODEL.rooms},'fastcnc-project.json');}
  function loadProject(data){if(!data||!Array.isArray(data.rooms)||!data.rooms.length)throw new Error('no rooms in project');
    MODEL.rooms=data.rooms;MODEL.rooms.forEach(r=>{if(r.matCost==null)r.matCost=70;if(r.cncCost==null)r.cncCost=330;});
    view={room:MODEL.rooms[0],wall:MODEL.rooms[0].walls[0]};sel={kind:'wall',room:MODEL.rooms[0],wall:MODEL.rooms[0].walls[0],op:null,panelId:null};renderAll();}
  function setTheme(th){theme=th;app.classList.toggle('dark',th==='dark');renderChrome();renderCanvas();}
  function setLang(l){lang=l;document.documentElement.lang=l;renderAll();}
  function toggleOpt(e){if(e)e.stopPropagation();optpop.classList.toggle('show');}
  document.addEventListener('click',e=>{if(!optpop.contains(e.target)&&e.target.id!=='gear')optpop.classList.remove('show');});
  document.getElementById('fileInput').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;
    try{const data=JSON.parse(await f.text());if(Array.isArray(data.blocks))importQuote(data);else if(Array.isArray(data.rooms))loadProject(data);else throw new Error('unrecognized file');}
    catch(err){alert('Could not load this file: '+(err&&err.message||err));}e.target.value='';});
  document.getElementById('exportBtn').onclick=exportDXF;

  renderAll();
</script>
</body>
